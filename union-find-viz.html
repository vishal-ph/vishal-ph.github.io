<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Union-Find Decoder Visualizer | Vishal Sharma</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.6rem 1.25rem;
            background: rgba(10, 10, 20, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            flex-shrink: 0;
            z-index: 10;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.04em;
            transition: color 0.2s;
        }

        .back-link:hover { color: #e2e8f0; }

        .back-link svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .divider {
            width: 1px;
            height: 16px;
            background: rgba(255, 255, 255, 0.15);
        }

        .page-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: #cbd5e1;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .tag {
            margin-left: auto;
            font-size: 0.7rem;
            padding: 0.2rem 0.55rem;
            border-radius: 4px;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.25);
            letter-spacing: 0.04em;
        }

        .viz-frame {
            flex: 1;
            width: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-link">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back
        </a>
        <div class="divider"></div>
        <span class="page-title">Union-Find Decoder</span>
        <span class="tag">Interactive</span>
    </div>
    <iframe
        class="viz-frame"
        src="union-find-viz/web/index.html"
        title="Union-Find Decoder Visualizer"
        allowfullscreen
    ></iframe>
</body>
</html>
